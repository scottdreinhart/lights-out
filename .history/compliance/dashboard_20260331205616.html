<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Platform Compliance Dashboard</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        padding: 20px;
        color: #333;
      }

      .container {
        max-width: 1600px;
        margin: 0 auto;
      }

      .header {
        background: white;
        border-radius: 12px;
        padding: 30px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .header h1 {
        font-size: 32px;
        margin-bottom: 10px;
        color: #667eea;
      }

      .header p {
        font-size: 16px;
        color: #666;
        margin-bottom: 15px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-top: 20px;
      }

      .stat-card {
        background: #f5f5f5;
        padding: 15px;
        border-radius: 8px;
        border-left: 4px solid #667eea;
      }

      .stat-card h3 {
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 8px;
      }

      .stat-card .value {
        font-size: 28px;
        font-weight: bold;
        color: #667eea;
      }

      .stat-card.complete {
        border-left-color: #10b981;
      }

      .stat-card.complete .value {
        color: #10b981;
      }

      .stat-card.partial {
        border-left-color: #f59e0b;
      }

      .stat-card.partial .value {
        color: #f59e0b;
      }

      .stat-card.pending {
        border-left-color: #ef4444;
      }

      .stat-card.pending .value {
        color: #ef4444;
      }

      .controls {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        display: flex;
        flex-wrap: wrap;
        gap: 15px;
        align-items: center;
      }

      .control-group {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }

      .control-group label {
        font-size: 12px;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }

      select,
      input {
        padding: 8px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        font-family: inherit;
      }

      select:focus,
      input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }

      .matrix-container {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        overflow-x: auto;
      }

      .matrix-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 14px;
      }

      .matrix-table th {
        background: #f5f5f5;
        padding: 12px;
        text-align: left;
        font-weight: 600;
        color: #333;
        border-bottom: 2px solid #e5e5e5;
        position: sticky;
        top: 0;
      }

      .matrix-table th:first-child {
        min-width: 150px;
      }

      .matrix-table td {
        padding: 12px;
        border-bottom: 1px solid #e5e5e5;
      }

      .matrix-table tr:hover {
        background: #f9f9f9;
      }

      .game-name {
        font-weight: 600;
        color: #333;
        min-width: 150px;
      }

      .cell {
        text-align: center;
        font-size: 12px;
        font-weight: 600;
        padding: 8px;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.2s;
      }

      .cell:hover {
        transform: scale(1.05);
      }

      .cell.complete {
        background: #d1fae5;
        color: #065f46;
      }

      .cell.partial {
        background: #fef3c7;
        color: #92400e;
      }

      .cell.not-started {
        background: #fee2e2;
        color: #991b1b;
      }

      .blockers-container {
        background: white;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      .blockers-container h2 {
        margin-bottom: 20px;
        color: #333;
        font-size: 20px;
      }

      .blockers-filter {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
        flex-wrap: wrap;
      }

      .blocker-button {
        padding: 8px 16px;
        border: 1px solid #ddd;
        background: white;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.2s;
      }

      .blocker-button:hover {
        border-color: #667eea;
        color: #667eea;
      }

      .blocker-button.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }

      .blocker-list {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 15px;
      }

      .blocker-card {
        border-left: 4px solid #ef4444;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 6px;
        border: 1px solid #e5e5e5;
      }

      .blocker-card.medium {
        border-left-color: #f59e0b;
      }

      .blocker-card.low {
        border-left-color: #3b82f6;
      }

      .blocker-severity {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        margin-bottom: 10px;
      }

      .blocker-severity.high {
        background: #fee2e2;
        color: #991b1b;
      }

      .blocker-severity.medium {
        background: #fef3c7;
        color: #92400e;
      }

      .blocker-severity.low {
        background: #dbeafe;
        color: #1e40af;
      }

      .report-tab {
        padding: 10px 20px;
        background: white;
        border: 2px solid #ddd;
        border-radius: 6px;
        cursor: pointer;
        font-weight: 600;
        font-size: 14px;
        transition: all 0.2s;
      }

      .report-tab:hover {
        border-color: #667eea;
        color: #667eea;
      }

      .report-tab.active {
        background: #667eea;
        color: white;
        border-color: #667eea;
      }

      .report-container {
        display: none;
      }

      .report-container.active {
        display: block;
      }

      .feature-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 15px;
      }

      .feature-card {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 15px;
        background: #f9f9f9;
      }

      .feature-card h4 {
        margin-top: 0;
        margin-bottom: 10px;
        color: #333;
      }

      .feature-badge {
        display: inline-block;
        padding: 4px 8px;
        margin: 3px 3px 3px 0;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .feature-badge.has {
        background: #d1fae5;
        color: #065f46;
      }

      .feature-badge.missing {
        background: #fee2e2;
        color: #991b1b;
      }

      .type-distribution {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 15px;
      }

      .type-card {
        border-left: 4px solid #667eea;
        padding: 15px;
        background: #f9f9f9;
        border-radius: 6px;
      }

      .type-card h3 {
        margin: 0 0 10px 0;
        color: #333;
      }

      .type-card .count {
        font-size: 28px;
        font-weight: bold;
        color: #667eea;
        margin: 10px 0;
      }

      .type-card .games {
        font-size: 12px;
        color: #666;
        line-height: 1.6;
      }

      .wasm-status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 15px;
      }

      .wasm-card {
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        padding: 15px;
        background: #f9f9f9;
      }

      .wasm-card.has {
        border-left: 4px solid #10b981;
      }

      .wasm-card.needs {
        border-left: 4px solid #f59e0b;
      }

      .wasm-card.candidate {
        border-left: 4px solid #3b82f6;
      }

      .blocker-header {
        display: flex;
        justify-content: space-between;
        align-items: start;
        margin-bottom: 10px;
      }

      .blocker-title {
        font-weight: 600;
        color: #333;
        margin-bottom: 8px;
      }

      .blocker-game {
        font-size: 12px;
        color: #666;
      }

      .blocker-game::before {
        content: '🎮 ';
      }

      .blocker-platform {
        font-size: 12px;
        color: #666;
      }

      .blocker-platform::before {
        content: '🌐 ';
      }

      .blocker-issue {
        font-size: 14px;
        color: #333;
        margin: 10px 0;
      }

      .blocker-resolution {
        font-size: 13px;
        color: #666;
        background: white;
        padding: 10px;
        border-radius: 4px;
        margin-top: 10px;
        font-style: italic;
      }

      .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 1000;
      }

      .modal.active {
        display: flex;
      }

      .modal-content {
        background: white;
        border-radius: 12px;
        padding: 30px;
        max-width: 600px;
        max-height: 80vh;
        overflow-y: auto;
        box-shadow: 0 20px 25px rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 15px;
        color: #333;
      }

      .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #999;
      }

      .modal-section {
        margin-bottom: 20px;
      }

      .modal-section h3 {
        font-size: 14px;
        color: #999;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
      }

      .modal-section p {
        color: #666;
        line-height: 1.6;
      }

      .badge {
        display: inline-block;
        padding: 4px 8px;
        background: #f5f5f5;
        border-radius: 4px;
        font-size: 12px;
        color: #666;
        margin-right: 5px;
        margin-bottom: 5px;
      }

      .legend {
        display: flex;
        gap: 20px;
        flex-wrap: wrap;
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #e5e5e5;
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }

      .legend-color {
        width: 20px;
        height: 20px;
        border-radius: 4px;
      }

      .loading {
        text-align: center;
        padding: 40px;
        color: #666;
      }

      .error {
        background: #fee2e2;
        color: #991b1b;
        padding: 20px;
        border-radius: 8px;
        margin-bottom: 20px;
      }

      @media (max-width: 768px) {
        .controls {
          flex-direction: column;
          align-items: stretch;
        }

        .control-group {
          width: 100%;
        }

        select,
        input {
          width: 100%;
        }

        .stats {
          grid-template-columns: 1fr;
        }

        .matrix-table {
          font-size: 12px;
        }

        .matrix-table th,
        .matrix-table td {
          padding: 8px;
        }

        .blocker-list {
          grid-template-columns: 1fr;
        }

        .report-tab {
          padding: 8px 12px;
          font-size: 12px;
        }

        .feature-grid,
        .type-distribution,
        .wasm-status-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Header -->
      <div class="header">
        <h1>🎮 Game Platform Compliance Dashboard</h1>
        <p>Track deployment readiness across 44 games and 10 platforms</p>

        <div class="stats" id="stats">
          <div class="loading">Loading compliance data...</div>
        </div>

        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #d1fae5"></div>
            <span>Complete (100%)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #fef3c7"></div>
            <span>Partial (40-99%)</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: #fee2e2"></div>
            <span>Not Started (0-39%)</span>
          </div>
        </div>
      </div>

      <!-- Report Tabs -->
      <div class="controls" style="padding: 10px; gap: 8px">
        <button class="report-tab active" onclick="switchReport('coverage')">
          📊 Coverage Matrix
        </button>
        <button class="report-tab" onclick="switchReport('features')">🔧 Code Reuse</button>
        <button class="report-tab" onclick="switchReport('wasm')">⚡ WASM Status</button>
        <button class="report-tab" onclick="switchReport('platforms')">🌐 Platform Ready</button>
        <button class="report-tab" onclick="switchReport('types')">🎮 Game Types</button>
      </div>

      <!-- Filters (Coverage Report) -->
      <div id="coverage-filters" class="controls">
        <div class="control-group">
          <label>Filter by Game</label>
          <select id="gameFilter">
            <option value="">All Games</option>
          </select>
        </div>
        <div class="control-group">
          <label>Filter by Platform</label>
          <select id="platformFilter">
            <option value="">All Platforms</option>
          </select>
        </div>
        <div class="control-group">
          <label>Filter by Status</label>
          <select id="statusFilter">
            <option value="">All Statuses</option>
            <option value="complete">Complete</option>
            <option value="partial">Partial</option>
            <option value="not-started">Not Started</option>
          </select>
        </div>
        <div class="control-group">
          <label>&nbsp;</label>
          <button
            style="
              padding: 8px 16px;
              background: #667eea;
              color: white;
              border: none;
              border-radius: 6px;
              cursor: pointer;
              font-weight: 600;
            "
            onclick="resetFilters()"
          >
            Reset
          </button>
        </div>
      </div>

      <!-- Filters (Features Report) -->
      <div id="features-filters" class="controls" style="display: none">
        <div class="control-group">
          <label>Include Features</label>
          <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px">
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featureTests" checked /> Tests
            </label>
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featureWorkers" checked /> Workers
            </label>
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featureWasm" checked /> WASM
            </label>
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featurePlaywright" checked /> Playwright
            </label>
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featureElectron" checked /> Electron
            </label>
            <label style="margin: 0; font-weight: 400">
              <input type="checkbox" id="featureReadme" checked /> Readme
            </label>
          </div>
        </div>
        <div class="control-group">
          <label>&nbsp;</label>
          <button
            style="
              padding: 8px 16px;
              background: #667eea;
              color: white;
              border: none;
              border-radius: 6px;
              cursor: pointer;
              font-weight: 600;
            "
            onclick="updateFeatureReport()"
          >
            Update
          </button>
        </div>
      </div>

      <!-- Reports -->
      <div id="coverage-report" class="report-container active">
        <div class="matrix-container">
          <h2 style="margin-bottom: 15px; color: #333">Coverage Matrix</h2>
          <table class="matrix-table" id="matrixTable">
            <thead>
              <tr>
                <th>Game</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td colspan="100" class="loading">Loading matrix...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div id="features-report" class="report-container">
        <!-- Features report will be rendered here -->
      </div>

      <div id="wasm-report" class="report-container">
        <!-- WASM report will be rendered here -->
      </div>

      <div id="platforms-report" class="report-container">
        <!-- Platform report will be rendered here -->
      </div>

      <div id="types-report" class="report-container">
        <!-- Type report will be rendered here -->
      </div>

      <!-- Blockers -->
      <div class="blockers-container">
        <h2>🚨 Known Blockers</h2>
        <div class="blockers-filter">
          <button class="blocker-button active" onclick="filterBlockers('all')">
            All (<span id="blocker-count-all">0</span>)
          </button>
          <button class="blocker-button" onclick="filterBlockers('high')">
            🔴 High (<span id="blocker-count-high">0</span>)
          </button>
          <button class="blocker-button" onclick="filterBlockers('medium')">
            🟡 Medium (<span id="blocker-count-medium">0</span>)
          </button>
          <button class="blocker-button" onclick="filterBlockers('low')">
            🔵 Low (<span id="blocker-count-low">0</span>)
          </button>
        </div>
        <div class="blocker-list" id="blockerList">
          <div class="loading">Loading blockers...</div>
        </div>
      </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="cellModal">
      <div style="position: relative">
        <button class="modal-close" onclick="closeModal()">&times;</button>
        <div class="modal-content" id="modalContent">
          <div class="loading">Loading details...</div>
        </div>
      </div>
    </div>

    <script>
      let complianceData = {
        sources: null,
        matrix: null,
        baseline: null,
        blockers: null,
      }

      let currentFilters = {
        game: '',
        platform: '',
        status: '',
      }

      let currentReport = 'coverage'

      // Load compliance data
      async function loadData() {
        try {
          const [sourcesRes, matrixRes, baselineRes, blockersRes] = await Promise.all([
            fetch('./sources.json'),
            fetch('./matrix.json'),
            fetch('./baseline.json'),
            fetch('./blockers.json'),
          ])

          if (!sourcesRes.ok || !matrixRes.ok || !baselineRes.ok || !blockersRes.ok) {
            throw new Error('Failed to load compliance files')
          }

          complianceData.sources = await sourcesRes.json()
          complianceData.matrix = await matrixRes.json()
          complianceData.baseline = await baselineRes.json()
          complianceData.blockers = await blockersRes.json()

          renderDashboard()
        } catch (error) {
          console.error('Error loading data:', error)
          document.body.innerHTML = `
          <div class="container">
            <div class="error">
              <strong>Error loading compliance data:</strong> ${error.message}
              <br><br>
              <p>Make sure the following files exist:</p>
              <ul style="margin-left: 20px; margin-top: 10px;">
                <li>compliance/sources.json</li>
                <li>compliance/matrix.json</li>
                <li>compliance/baseline.json</li>
                <li>compliance/blockers.json</li>
              </ul>
            </div>
          </div>
        `
        }
      }

      function renderDashboard() {
        renderStats()
        populateFilters()
        renderBlockers()
        switchReport('coverage')
      }

      function switchReport(report) {
        currentReport = report

        // Update active button
        document.querySelectorAll('.report-tab').forEach((btn) => {
          btn.classList.remove('active')
        })
        event.target.classList.add('active')

        // Hide all report containers
        document.querySelectorAll('.report-container').forEach((container) => {
          container.classList.remove('active')
        })

        // Show selected report
        const reportContainer = document.getElementById(`${report}-report`)
        if (reportContainer) {
          reportContainer.classList.add('active')
        }

        // Update visible filters
        document.getElementById('coverage-filters').style.display =
          report === 'coverage' ? 'flex' : 'none'
        document.getElementById('features-filters').style.display =
          report === 'features' ? 'flex' : 'none'

        // Render the appropriate report
        switch (report) {
          case 'coverage':
            renderMatrix()
            break
          case 'features':
            renderFeatureReport()
            break
          case 'wasm':
            renderWasmReport()
            break
          case 'platforms':
            renderPlatformReport()
            break
          case 'types':
            renderTypeReport()
            break
        }
      }

      function renderStats() {
        const { matrix } = complianceData
        const games = matrix.games
        const platforms = matrix.platforms

        let complete = 0
        let partial = 0
        let notStarted = 0

        for (const game of games) {
          for (const platform of platforms) {
            const cell = matrix.matrix[game][platform]
            if (cell.status === 'complete') complete++
            else if (cell.status === 'partial') partial++
            else notStarted++
          }
        }

        const total = games.length * platforms.length
        const overall = (((complete + partial * 0.5) / total) * 100).toFixed(1)

        document.getElementById('stats').innerHTML = `
        <div class="stat-card complete">
          <h3>Complete</h3>
          <div class="value">${complete}</div>
        </div>
        <div class="stat-card partial">
          <h3>Partial</h3>
          <div class="value">${partial}</div>
        </div>
        <div class="stat-card pending">
          <h3>Not Started</h3>
          <div class="value">${notStarted}</div>
        </div>
        <div class="stat-card">
          <h3>Overall Progress</h3>
          <div class="value">${overall}%</div>
        </div>
      `
      }

      function populateFilters() {
        const { matrix, baseline } = complianceData

        // Games
        const gameFilter = document.getElementById('gameFilter')
        gameFilter.innerHTML = '<option value="">All Games</option>'
        for (const game of matrix.games) {
          const option = document.createElement('option')
          option.value = game
          option.textContent = game
          gameFilter.appendChild(option)
        }

        // Platforms
        const platformFilter = document.getElementById('platformFilter')
        platformFilter.innerHTML = '<option value="">All Platforms</option>'
        for (const platform of matrix.platforms) {
          const option = document.createElement('option')
          option.value = platform
          option.textContent = platform
          platformFilter.appendChild(option)
        }

        // Add event listeners
        document.getElementById('gameFilter').addEventListener('change', (e) => {
          currentFilters.game = e.target.value
          renderMatrix()
        })

        document.getElementById('platformFilter').addEventListener('change', (e) => {
          currentFilters.platform = e.target.value
          renderMatrix()
        })

        document.getElementById('statusFilter').addEventListener('change', (e) => {
          currentFilters.status = e.target.value
          renderMatrix()
        })
      }

      function renderMatrix() {
        const { matrix, baseline } = complianceData
        const table = document.getElementById('matrixTable')
        const headerRow = table.querySelector('thead tr')
        const tbody = table.querySelector('tbody')

        // Filter games
        let visibleGames = currentFilters.game ? [currentFilters.game] : matrix.games

        // Filter platforms
        let visiblePlatforms = currentFilters.platform ? [currentFilters.platform] : matrix.platforms

        // Add platform headers
        headerRow.innerHTML = '<th>Game</th>'
        for (const platform of visiblePlatforms) {
          const th = document.createElement('th')
          th.textContent = platform
          th.style.textAlign = 'center'
          headerRow.appendChild(th)
        }

        // Add game rows
        tbody.innerHTML = ''
        for (const game of visibleGames) {
          // Filter by status if needed
          if (currentFilters.status) {
            const gameBaselineData = baseline.games[game]
            const gameMaturity = gameBaselineData?.maturityLevel || 'not-started'

            // Check if game matches status filter
            let matchesStatus = false
            if (currentFilters.status === 'complete') {
              matchesStatus = gameMaturity === 'reference'
            } else if (currentFilters.status === 'partial') {
              matchesStatus = ['developing', 'mature'].includes(gameMaturity)
            } else if (currentFilters.status === 'not-started') {
              matchesStatus = ['not-started', 'minimal', 'basic'].includes(gameMaturity)
            }

            if (!matchesStatus) continue
          }

          const tr = document.createElement('tr')

          const gameTd = document.createElement('td')
          gameTd.className = 'game-name'
          gameTd.textContent = game
          tr.appendChild(gameTd)

          for (const platform of visiblePlatforms) {
            const cell = matrix.matrix[game][platform]
            const td = document.createElement('td')
            td.style.textAlign = 'center'

            const cellDiv = document.createElement('div')
            cellDiv.className = `cell ${cell.status}`
            cellDiv.textContent = `${cell.completionPercentage || 0}%`
            cellDiv.onclick = () => showCellDetails(game, platform)
            cellDiv.title = `Click for details`

            td.appendChild(cellDiv)
            tr.appendChild(td)
          }

          tbody.appendChild(tr)
        }
      }

      function renderFeatureReport() {
        const { baseline } = complianceData

        const container = document.getElementById('features-report')
        if (!container) return

        const games = Object.entries(baseline.games)
        const featureGrid = '<div class="feature-grid" id="feature-grid"></div>'
        container.innerHTML = featureGrid

        const grid = document.getElementById('feature-grid')

        games.forEach(([gameName, gameData]) => {
          const featureCard = document.createElement('div')
          featureCard.className = 'feature-card'

          const features = [
            { key: 'hasTests', label: 'Tests' },
            { key: 'hasWorkers', label: 'Workers' },
            { key: 'hasWasm', label: 'WASM' },
            { key: 'hasPlaywright', label: 'Playwright' },
            { key: 'hasElectronConfig', label: 'Electron' },
            { key: 'hasReadme', label: 'Readme' },
          ]

          let featureBadges = features
            .map((f) => {
              const has = gameData[f.key]
              return `<span class="feature-badge ${has ? 'has' : 'missing'}">${has ? '✓' : '○'} ${f.label}</span>`
            })
            .join('')

          featureCard.innerHTML = `
            <h4>${gameName}</h4>
            <div style="margin-bottom: 10px;">${featureBadges}</div>
            <div style="font-size: 12px; color: #666;">
              <div>Type: ${gameData.type}</div>
              <div>Maturity: ${gameData.maturityLevel}</div>
              <div>Completion: ${gameData.estimatedCompletion}%</div>
            </div>
          `

          grid.appendChild(featureCard)
        })
      }

      function updateFeatureReport() {
        renderFeatureReport()
      }

      function renderWasmReport() {
        const { baseline } = complianceData

        const container = document.getElementById('wasm-report')
        if (!container) return

        const games = Object.entries(baseline.games)

        const hasWasm = games.filter(([_, g]) => g.hasWasm)
        const needsWasm = games.filter(([_, g]) => !g.hasWasm && ['csp-puzzle', 'graph-puzzle', 'puzzle-logic'].includes(g.type))
        const candidates = games.filter(([_, g]) => !g.hasWasm && g.estimatedCompletion >= 60)

        container.innerHTML = `
          <h2 style="margin-bottom: 20px; color: #333">⚡ WASM Optimization Status</h2>

          <div style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 15px; color: #333; font-size: 18px;">✓ Has WASM Implementation (${hasWasm.length})</h3>
            <div class="wasm-status-grid">
              ${hasWasm
                .map(
                  ([name, game]) => `
                <div class="wasm-card has">
                  <h4 style="margin: 0 0 10px 0;">${name}</h4>
                  <div style="font-size: 12px; color: #666;">
                    <div>Type: ${game.type}</div>
                    <div>Maturity: ${game.maturityLevel}</div>
                    <div>Completion: ${game.estimatedCompletion}%</div>
                  </div>
                </div>
              `,
                )
                .join('')}
            </div>
          </div>

          <div style="margin-bottom: 30px;">
            <h3 style="margin-bottom: 15px; color: #333; font-size: 18px;">🟡 Needs WASM (CSP/Logic Puzzles) (${needsWasm.length})</h3>
            <div class="wasm-status-grid">
              ${needsWasm
                .map(
                  ([name, game]) => `
                <div class="wasm-card needs">
                  <h4 style="margin: 0 0 10px 0;">${name}</h4>
                  <div style="font-size: 12px; color: #666;">
                    <div>Type: ${game.type}</div>
                    <div>Priority: High</div>
                    <div>Completion: ${game.estimatedCompletion}%</div>
                  </div>
                </div>
              `,
                )
                .join('')}
            </div>
          </div>

          <div>
            <h3 style="margin-bottom: 15px; color: #333; font-size: 18px;">🔵 Candidates (${candidates.length - hasWasm.length})</h3>
            <div class="wasm-status-grid">
              ${candidates
                .filter(([_, g]) => !g.hasWasm)
                .slice(0, 10)
                .map(
                  ([name, game]) => `
                <div class="wasm-card candidate">
                  <h4 style="margin: 0 0 10px 0;">${name}</h4>
                  <div style="font-size: 12px; color: #666;">
                    <div>Type: ${game.type}</div>
                    <div>Completion: ${game.estimatedCompletion}%</div>
                    <div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #ddd;">Consider if: AI solver, complex algorithm needed</div>
                  </div>
                </div>
              `,
                )
                .join('')}
            </div>
          </div>
        `
      }

      function renderPlatformReport() {
        const { baseline, matrix } = complianceData

        const container = document.getElementById('platforms-report')
        if (!container) return

        // Analyze platform readiness
        const platformStats = {}
        for (const platform of matrix.platforms) {
          platformStats[platform] = {
            total: matrix.games.length,
            complete: 0,
            partial: 0,
            notStarted: 0,
          }

          for (const game of matrix.games) {
            const cell = matrix.matrix[game][platform]
            if (cell.status === 'complete') platformStats[platform].complete++
            else if (cell.status === 'partial') platformStats[platform].partial++
            else platformStats[platform].notStarted++
          }
        }

        container.innerHTML = `
          <h2 style="margin-bottom: 20px; color: #333">🌐 Platform Readiness</h2>
          <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px;">
            ${Object.entries(platformStats)
              .map(
                ([platform, stats]) => {
                  const readiness = ((stats.complete + stats.partial * 0.5) / stats.total * 100).toFixed(0)
                  return `
              <div style="border: 1px solid #e5e5e5; border-radius: 8px; padding: 20px; background: #f9f9f9;">
                <h3 style="margin: 0 0 15px 0; color: #333;">${platform}</h3>
                <div style="font-size: 28px; font-weight: bold; color: #667eea; margin: 10px 0;">${readiness}%</div>
                <div style="font-size: 12px; color: #666; line-height: 1.8;">
                  <div>✓ Complete: ${stats.complete}/${stats.total}</div>
                  <div>→ Partial: ${stats.partial}/${stats.total}</div>
                  <div>○ Not Started: ${stats.notStarted}/${stats.total}</div>
                </div>
              </div>
            `,
              )
              .join('')}
          </div>
        `
      }

      function renderTypeReport() {
        const { baseline } = complianceData

        const container = document.getElementById('types-report')
        if (!container) return

        // Group games by type
        const typeMap = {}
        Object.entries(baseline.games).forEach(([gameName, gameData]) => {
          if (!typeMap[gameData.type]) {
            typeMap[gameData.type] = []
          }
          typeMap[gameData.type].push(gameName)
        })

        const colorMap = {
          'board-game': '#667eea',
          'dice-game': '#f59e0b',
          'puzzle-logic': '#10b981',
          'csp-puzzle': '#8b5cf6',
          'graph-puzzle': '#06b6d4',
          'word-game': '#ec4899',
          'puzzle-game': '#6366f1',
          'logic-game': '#14b8a6',
          'memory-game': '#f97316',
          'arcade-game': '#ef4444',
          'game-of-chance': '#6b7280',
          'state-game': '#3b82f6',
        }

        container.innerHTML = `
          <h2 style="margin-bottom: 20px; color: #333">🎮 Game Type Distribution</h2>
          <div class="type-distribution">
            ${Object.entries(typeMap)
              .sort((a, b) => b[1].length - a[1].length)
              .map(
                ([type, games]) => `
            <div class="type-card" style="border-left-color: ${colorMap[type] || '#667eea'}">
              <h3>${type}</h3>
              <div class="count">${games.length}</div>
              <div class="games">${games.join(', ')}</div>
            </div>
          `,
              )
              .join('')}
          </div>
        `
      }

      function renderBlockers() {
        const { blockers } = complianceData
        const blocker = blockers.blockers || []

        // Count by severity
        document.getElementById('blocker-count-all').textContent = blocker.length
        document.getElementById('blocker-count-high').textContent = blocker.filter(
          (b) => b.severity === 'high',
        ).length
        document.getElementById('blocker-count-medium').textContent = blocker.filter(
          (b) => b.severity === 'medium',
        ).length
        document.getElementById('blocker-count-low').textContent = blocker.filter(
          (b) => b.severity === 'low',
        ).length

        renderBlockerList(blocker, 'all')
      }

      function renderBlockerList(blockers, severity) {
        let filtered = blockers
        if (severity !== 'all') {
          filtered = blockers.filter((b) => b.severity === severity)
        }

        const html = filtered
          .map(
            (b) => `
        <div class="blocker-card ${b.severity}">
          <div class="blocker-header">
            <div class="blocker-severity ${b.severity}">${b.severity}</div>
          </div>
          <div class="blocker-title">${b.id}</div>
          <div class="blocker-game">${b.game}</div>
          <div class="blocker-platform">${b.platform === 'all' ? 'All Platforms' : b.platform}</div>
          <div class="blocker-issue">${b.issue}</div>
          <div class="blocker-resolution">💡 ${b.resolution || 'TBD'}</div>
          <div style="margin-top: 10px; font-size: 12px; color: #999;">Status: ${b.status}</div>
        </div>
      `,
          )
          .join('')

        document.getElementById('blockerList').innerHTML =
          html || '<p style="color: #666; grid-column: 1/-1;">No blockers found</p>'
      }

      function filterBlockers(severity) {
        const buttons = document.querySelectorAll('.blocker-button')
        buttons.forEach((b) => b.classList.remove('active'))
        event.target.classList.add('active')

        const blockers = complianceData.blockers.blockers || []
        renderBlockerList(blockers, severity)
      }

      function resetFilters() {
        document.getElementById('gameFilter').value = ''
        document.getElementById('platformFilter').value = ''
        document.getElementById('statusFilter').value = ''
        currentFilters.game = ''
        currentFilters.platform = ''
        currentFilters.status = ''
        renderMatrix()
      }

      function showCellDetails(game, platform) {
        const { sources, matrix } = complianceData
        const cell = matrix.matrix[game][platform]
        const gameRule = sources.gameRules[game]
        const platformConfig = sources.platforms[platform]

        const html = `
        <div class="modal-header">${game} on ${platform}</div>

        <div class="modal-section">
          <h3>Status</h3>
          <p><strong>${cell.status}</strong> - ${cell.completionPercentage}% complete</p>
        </div>

        ${
          gameRule
            ? `
          <div class="modal-section">
            <h3>Game Rules</h3>
            <p><strong>${gameRule.title}</strong></p>
            <p style="margin-top: 10px; font-size: 13px;">Category: ${gameRule.category}</p>
            ${
              gameRule.sources
                ? `
              <div style="margin-top: 10px;">
                <strong>Sources:</strong>
                ${gameRule.sources
                  .map(
                    (s) => `
                  <div style="margin: 5px 0;">
                    <a href="${s.url}" target="_blank" style="color: #667eea;">→ ${s.title}</a>
                  </div>
                `,
                  )
                  .join('')}
              </div>
            `
                : ''
            }
          </div>
        `
            : ''
        }

        ${
          platformConfig
            ? `
          <div class="modal-section">
            <h3>Platform Requirements</h3>
            <p><strong>${platformConfig.title}</strong></p>
            ${
              platformConfig.constraints
                ? `
              <div style="margin-top: 10px; font-size: 13px;">
                <p><strong>Bundle Size:</strong> ${platformConfig.constraints.maxBundleSize}</p>
                <p><strong>Performance:</strong> ${platformConfig.constraints.performance || 'Standard'}</p>
              </div>
            `
                : ''
            }
          </div>
        `
            : ''
        }

        <div class="modal-section">
          <h3>Validation Checklist</h3>
          <div style="font-size: 13px; color: #666;">
            ${[
              'appExists',
              'rulesVerified',
              'platformAdapter',
              'performanceCompliance',
              'uiCompliance',
              'blockersFree',
            ]
              .map((check) => {
                const status = cell[check] ? '✓' : '○'
                const label = check.replace(/([A-Z])/g, ' $1').trim()
                return `<div style="margin: 5px 0;">${status} ${label}</div>`
              })
              .join('')}
          </div>
        </div>

        ${
          cell.phases
            ? `
          <div class="modal-section">
            <h3>Phases</h3>
            <div style="font-size: 13px;">
              ${Object.entries(cell.phases)
                .map(
                  ([phase, status]) => `
                <div style="margin: 5px 0; padding: 5px; background: ${status === 'complete' ? '#d1fae5' : status === 'in-progress' ? '#fef3c7' : '#fee2e2'}; border-radius: 4px;">
                  ${status === 'complete' ? '✓' : status === 'in-progress' ? '→' : '○'} ${phase} (${status})
                </div>
              `,
                )
                .join('')}
            </div>
          </div>
        `
            : ''
        }

        ${
          cell.notes
            ? `
          <div class="modal-section">
            <h3>Notes</h3>
            <p style="font-style: italic;">${cell.notes}</p>
          </div>
        `
            : ''
        }
      `

        document.getElementById('modalContent').innerHTML = html
        document.getElementById('cellModal').classList.add('active')
      }

      function closeModal() {
        document.getElementById('cellModal').classList.remove('active')
      }

      // Load data on startup
      loadData()
    </script>
  </body>
</html>
