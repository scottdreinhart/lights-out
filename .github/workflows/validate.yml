name: Validate

on:
  push:
    branches: [main, develop, alpha, beta]
  pull_request:
    branches: [main, develop, alpha, beta]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [24.14.0]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint
        continue-on-error: false

      - name: Format Check
        run: pnpm format:check
        continue-on-error: false

      - name: TypeScript Check
        run: pnpm typecheck
        continue-on-error: false

      - name: Build
        run: pnpm build
        continue-on-error: false

      - name: Tests
        run: pnpm test
        continue-on-error: false

  compliance-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Compliance Metrics
        id: compliance_gen
        run: pnpm compliance:metrics
        continue-on-error: true

      - name: Validate Compliance
        id: compliance_validate
        run: pnpm validate:compliance
        continue-on-error: true

      - name: Upload Compliance Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compliance-metrics
          path: compliance/matrix.json
          if-no-files-found: warn

      - name: Comment Compliance Status
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const matrix = JSON.parse(fs.readFileSync('compliance/matrix.json', 'utf-8'));
            const stats = matrix.compliance?.metadata?.overallStatus || { green: '?', amber: '?', red: '?' };
            const comment = `## 📊 Compliance Metrics\n\n- 🟢 Compliant: ${stats.green}/25\n- 🟡 Partial: ${stats.amber}/25\n- 🔴 Issues: ${stats.red}/25\n- **Total**: ${stats.completionPercentage || '?'}% compliant\n\nView full report: [Compliance Dashboard](compliance/dashboard.html)`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  app-contract-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        include:
          - appName: tictactoe
            appPackage: '@games/tictactoe'
            reportsPath: 'apps/tictactoe/reports'
          - appName: monchola
            appPackage: '@games/monchola'
            reportsPath: 'apps/monchola/reports'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run app report contract
        id: app_report_contract
        run: pnpm --filter "${{ matrix.appPackage }}" report:all
        continue-on-error: true

      - name: Upload app reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.appName }}
          path: ${{ matrix.reportsPath }}/**
          if-no-files-found: warn

      - name: Fail when report contract fails
        if: steps.app_report_contract.outcome == 'failure'
        run: |
          echo "❌ App report contract failed for ${{ matrix.appPackage }}"
          exit 1

  # Separate job for Electron build (optional, Windows-only)
  electron-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Electron (Linux)
        run: pnpm electron:build:linux
        continue-on-error: true

    # Note: Windows and macOS builds require their respective runners
    # Add them below when needed:
    # - windows-latest for electron:build:win
    # - macos-latest for electron:build:mac

  # Capacitor sync check (mobile development)
  capacitor-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Capacitor Sync
        run: pnpm cap:sync
        continue-on-error: true

  # WASM build check
  wasm-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && contains(github.ref, 'main') && !contains(github.event.head_commit.message, '[skip wasm]')

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.31.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM
        run: pnpm wasm:build
        continue-on-error: true

  status-check:
    runs-on: ubuntu-latest
    needs: [validate, app-contract-matrix, compliance-metrics]
    if: always()
    steps:
      - name: Check validation status
        run: |
          if [ "${{ needs.validate.result }}" == "failure" ] || [ "${{ needs.app-contract-matrix.result }}" == "failure" ]; then
            echo "❌ Validation failed"
            exit 1
          else
            echo "✅ All validations passed"
          fi
